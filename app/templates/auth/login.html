{% extends 'base.html' %}
{% block title %}Login — BookGlam{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-16 px-4" style="background:linear-gradient(135deg,#FAF6F0 0%,#F5E6DC 100%);">
  <div class="w-full max-w-md">
    <div class="text-center mb-10">
      <a href="{{ url_for('main.index') }}" style="font-family:'Playfair Display',serif; font-weight:700; font-size:2rem; color:#1A1410;">Book<span style="color:#C9A84C;">Glam</span></a>
      <p style="color:#6B5E52; margin-top:8px;">Welcome back. Sign in to your account.</p>
    </div>
    <div class="card-glam p-8">
      <form method="POST" class="space-y-5">
        <div>
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required />
        </div>
        <div>
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 mb-0 cursor-pointer" style="font-weight:400;">
            <input type="checkbox" name="remember" style="width:auto; border-radius:2px;" /> Remember me
          </label>
          <a href="#" style="color:#C9A84C; font-size:0.85rem;">Forgot password?</a>
        </div>
        <button type="submit" class="btn-gold w-full py-3 text-base">Sign In</button>
      </form>
      <p class="text-center mt-6" style="color:#6B5E52; font-size:0.875rem;">
        Don't have an account? <a href="{{ url_for('auth.signup') }}" style="color:#C9A84C; font-weight:600;">Sign up free</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
